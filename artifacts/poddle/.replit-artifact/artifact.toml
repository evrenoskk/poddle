kind = "mobile"
previewPath = "/"
title = "Poddle - AI Pet Care"
version = "1.0.0"
id = "artifacts/poddle"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25487

[services.development]
run = "pnpm --filter @workspace/poddle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poddle", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/poddle", "run", "serve" ]

[services.env]
PORT = "25487"
BASE_PATH = "/"
